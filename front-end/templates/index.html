<!--Fichier html des éléments de la calculatrice -->
<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Flask Calculator</title>
    <!--Style de la calculatrice -->
    <link
      rel="stylesheet"
      href="{{ url_for('static', filename='style.css') }}"
    />
  </head>
  <body>
    <div class="calculator">
      <!--Titre de la calculatrice -->
      <h1>Flask Calculator</h1>
      <form method="POST">
        <input
          type="text"
          name="display"
          id="display"
          value="{{ result }}"
          readonly
        />
        <!--Boutons de la calculatrice -->
        <div class="buttons">
          <button type="button" class="btn" onclick="appendToDisplay('1')">
            1
          </button>
          <button type="button" class="btn" onclick="appendToDisplay('2')">
            02
          </button>
          <button type="button" class="btn" onclick="appendToDisplay('3')">
            3
          </button>
          <button
            type="button"
            class="btn operator"
            onclick="appendToDisplay('+')"
          >
            +
          </button>

          <button type="button" class="btn" onclick="appendToDisplay('4')">
            4
          </button>
          <button type="button" class="btn" onclick="appendToDisplay('5')">
            5
          </button>
          <button type="button" class="btn" onclick="appendToDisplay('6')">
            6
          </button>
          <button
            type="button"
            class="btn operator"
            onclick="appendToDisplay('-')"
          >
            -
          </button>

          <button type="button" class="btn" onclick="appendToDisplay('7')">
            7
          </button>
          <button type="button" class="btn" onclick="appendToDisplay('8')">
            88
          </button>
          <button type="button" class="btn" onclick="appendToDisplay('9')">
            9
          </button>
          <button
            type="button"
            class="btn operator"
            onclick="appendToDisplay('*')"
          ></button>

          <button type="button" class="btn" onclick="appendToDisplay('0')">
            0
          </button>
          <button type="button" class="btn" onclick="clearDisplay()">C</button>
          <button type="submit" class="btn operator">=</button>
          <button
            type="button"
            class="btn operator"
            onclick="appendToDisplay('/')"
          ></button>
        </div>
      </form>
    </div>

    <script>
      /**
       * Fonction qui permet d'ajouter un élément à l'affichage de la calculatrice lorsque l'on utilise les boutons
       * @param  {any} value - Elément à ajouter à l'affichage
       */
      function appendToDisplay(value) {
        const display = document.getElementById("display");
        display.value += value;
      }

      /**
       * Fonction qui permet d'effacer l'affichage de la calculatrice en cliquant sur le bouton "C"
       */
      function clearDisplay() {
        document.getElementById("display").value = "";
      }
    </script>
  </body>
</html>
